name: Update Metadata

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm i

      - name: Build
        run: npm run build

      - name: Run Update Task
        id: task_run
        run: npm run start:single
        env:
          RUN_MODE: "single"
          LOG_LEVEL: "debug"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEET_EPISODE_GUIDE: ${{ secrets.GOOGLE_SHEET_EPISODE_GUIDE }}
          GOOGLE_SHEET_EPISODE_DESCRIPTION: ${{ secrets.GOOGLE_SHEET_EPISODE_DESCRIPTION }}

      - name: Changes detected
        if: steps.task_run.outputs.changes_detected == 'true'
        run: echo "We committed something!"

      - name: Upload Output and Cache
        uses: actions/upload-artifact@v4
        with:
          name: update-task-artifacts
          path: |
            output/
            cache/
          retention-days: 1

  commit-and-push:
    runs-on: ubuntu-latest
    needs: update-task

    steps:
      - uses: actions/checkout@v4

      - name: Download Output and Cache
        uses: actions/download-artifact@v4
        with:
          name: update-task-artifacts

      - name: Commit and Push Changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated update [skip ci]"
          file_pattern: "cache/*.json output/*.json"
          status_options: "--ignored"
          add_options: "-f"

      - name: Changes detected
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: echo "We committed something!"
