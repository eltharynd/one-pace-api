name: Update Metadata

on:
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:
  # Runs on a schedule (uncomment if you want it on a timer)
  # schedule:
  #   - cron: '0 0 * * *'

# Grant the workflow write permissions to push changes back to the repo
permissions:
  contents: write

jobs:
  update-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm i

      - name: Build
        run: npm run build

      - name: Run Update Task
        run: npm run start:single
        env:
          RUN_MODE: "single"
          LOG_LEVEL: "info"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEET_EPISODE_GUIDE: ${{ secrets.GOOGLE_SHEET_EPISODE_GUIDE }}
          GOOGLE_SHEET_EPISODE_DESCRIPTION: ${{ secrets.GOOGLE_SHEET_EPISODE_DESCRIPTION }}

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated metadata update [skip ci]"
          file_pattern: "output/metadata.json"

          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
